version: 2
updates:
  # pnpm workspace — single root lockfile covers all packages/*
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
    allow:
      - dependency-type: 'production'
    groups:
      deps-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 10
    assignees:
      - 'Texarkanine'
    commit-message:
      prefix: 'fix'
      include: 'scope'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
    allow:
      - dependency-type: 'development'
    groups:
      dev-deps-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 10
    assignees:
      - 'Texarkanine'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  # GitHub Actions dependencies
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
    groups:
      github-actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 5
    assignees:
      - 'Texarkanine'
    commit-message:
      prefix: 'chore(deps-ci)'
